name: Bug Report
description: Report a bug in OpenComp
labels:
  - bug
  - needs-triage

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below as completely as possible so we can reproduce and fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click on...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: A clear and concise description of what actually happened.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Node version:
        OpenComp version:
        Deployment type (docker/bare metal):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any relevant log output. This will be formatted as a shell code block automatically.
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical - system down
        - High - major feature broken
        - Medium - feature partially broken
        - Low - minor inconvenience
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched for existing issues
          required: true
        - label: I have provided reproduction steps
          required: true
